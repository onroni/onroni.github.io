<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment</title>
    <link rel="stylesheet" type="text/css" href="payment-widget.css"/>
</head>
<body>
    <div class="main-container">
        <div class="payment-detail">
            <h3>Rp 540.000</h3>
        </div>
        <div class="title-bar">
            <button class="back-button hidden" onclick="backToMainWindow()">&#10094&#10094</button>
            <div class="title">Payment Method</div>
        </div>
        <div class="payment-container">
            <div class="payment-method" id="paymentMethodWindow">
                <div class="item" id="atm" onclick="showChildWindow('atm-window')">
                    <div>ATM</div>
                    <div>&#10095</div>
                </div>
                <div class="item" id="retail" onclick="showChildWindow('retail-window')">
                    <div>Retail</div>
                    <div>&#10095</div>
                </div>
                <div class="item" id="card" onclick="showChildWindow('card-window')">
                    <div>Credit / Debit</div>
                    <div>&#10095</div>
                </div>
                <div class="item" id="debit" onclick="showChildWindow('debit-window')">
                    <div>Debit Online</div>
                    <div>&#10095</div>
                </div>
                <div class="item" id="wallet" onclick="showChildWindow('wallet-window')">
                    <div>Wallet</div>
                    <div>&#10095</div>
                </div>
            </div>
    
            <div class="window" id="atm-window">
                <div class="list-container" id="atm-bank-list"></div>
                <button onclick="SetPaymentMethod('atm')">NEXT &#10095</button>
            </div>
            <div class="window" id="retail-window">
                <div class="list-container" id="retail-list"></div>
                <button onclick="SetPaymentMethod('retail')">NEXT &#10095</button>
                </form>
            </div>
            <div class="window" id="card-window">
                <div>Card</div>
                <button onclick="SetPaymentMethod('card')">NEXT &#10095</button>
            </div>
            <div class="window" id="debit-window">
                <div>Debit</div>
                <button onclick="SetPaymentMethod('debit')">NEXT &#10095</button>
            </div>
            <div class="window" id="wallet-window">
                <div>Wallet</div>
                <button onclick="SetPaymentMethod('wallet')">NEXT &#10095</button>
            </div>
        </div>
    </div>
</body>
<script defer src="jquery.min.js"></script>
<script defer src="payment-widget.js"></script>
</html>
